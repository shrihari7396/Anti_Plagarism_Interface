spring:
  application:
    name: ApiGateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: order-service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/api/v1/orders/**
              filters:
                - StripPrefix=2
                - AddRequestHeader=X-Custom-Header, Anuj

            - id: inventory-service
              uri: lb://INVENTORY-SERVICE
              predicates:
                - Path=/api/v1/inventory/**
              filters:
                - StripPrefix=2

            - id: no-service
              uri: lb://NO-SERVICE
              predicates:
                - Path=/api/v1/no-service/**
              filters:
                - AddRequestHeader=X-Custom-Header, Anuj
                - RedirectTo=302, https://codingshuttle.com

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

server:
  port: 8080
