syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.example.judge";
option java_outer_classname = "JudgeProto";

package judge;

// --- Language Service ---
service LanguageService {
  rpc GetAllLanguages (Empty) returns (LanguageList);
  rpc GetActiveLanguages (Empty) returns (LanguageList);
  rpc GetArchivedLanguages (Empty) returns (LanguageList);
  rpc GetLanguageById (LanguageId) returns (Language);
}

// --- Status Service ---
service StatusService {
  rpc GetAllStatuses (Empty) returns (StatusList);
  rpc GetStatusById (StatusId) returns (Status);
}

// --- Messages ---
message Empty {}

message LanguageId {
  int32 id = 1;
}

message Language {
  int32 id = 1;
  string name = 2;
  bool is_archived = 3;
  string source_file = 4;
  string compile_cmd = 5;
  string run_cmd = 6;
}

message LanguageList {
  repeated Language languages = 1;
}

message StatusId {
  int32 id = 1;
}

message Status {
  int32 id = 1;
  string description = 2;
}

message StatusList {
  repeated Status statuses = 1;
}
